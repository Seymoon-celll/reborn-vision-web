<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interface & Personnalisation — Reborn Vision</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root { --gold:#d4af37; --gold-light:#f4d03f; --gold-dark:#b8941f; --bg:#080808; --bg2:#0f0f0f; --border:rgba(212,175,55,0.18); --text:#e8e8e8; --text-muted:#888; --radius:12px; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; }
    header { position:sticky; top:0; z-index:100; background:rgba(8,8,8,0.95); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 2rem; height:64px; display:flex; align-items:center; justify-content:space-between; }
    .logo-container { display:flex; align-items:center; gap:12px; text-decoration:none; }
    .logo-icon { width:38px; height:38px; background:linear-gradient(135deg,var(--gold-dark),var(--gold-light)); display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-size:20px; font-weight:900; color:#000; border-radius:6px; box-shadow:0 0 16px rgba(212,175,55,0.35); flex-shrink:0; }
    .logo-text { font-family:'Cinzel',serif; font-size:16px; font-weight:700; color:var(--gold); letter-spacing:2px; }
    .lang-select { position:relative; display:inline-block; user-select:none; }
    .lang-select-btn { display:flex; align-items:center; gap:6px; background:rgba(212,175,55,0.06); border:1px solid rgba(212,175,55,0.25); border-radius:8px; padding:6px 12px; font-family:'Inter',sans-serif; font-size:12px; font-weight:600; color:var(--gold); cursor:pointer; transition:all 0.2s ease; white-space:nowrap; }
    .lang-select-btn:hover { background:rgba(212,175,55,0.12); border-color:rgba(212,175,55,0.45); }
    .lang-chevron { font-size:9px; transition:transform 0.2s ease; opacity:0.6; margin-left:2px; }
    .lang-select.open .lang-chevron { transform:rotate(180deg); }
    .lang-select-menu { position:absolute; top:calc(100% + 6px); right:0; min-width:130px; background:rgba(10,10,8,0.97); border:1px solid rgba(212,175,55,0.25); border-radius:8px; overflow:hidden; display:none; flex-direction:column; backdrop-filter:blur(16px); box-shadow:0 12px 40px rgba(0,0,0,0.6); z-index:999; }
    .lang-select.open .lang-select-menu { display:flex; }
    .lang-option { display:flex; align-items:center; gap:8px; width:100%; background:transparent; border:none; border-bottom:1px solid rgba(212,175,55,0.08); padding:9px 13px; font-family:'Inter',sans-serif; font-size:12px; font-weight:500; color:var(--text-muted); cursor:pointer; transition:all 0.15s ease; text-align:left; }
    .lang-option:last-child { border-bottom:none; }
    .lang-option:hover { background:rgba(212,175,55,0.09); color:var(--gold); }
    .lang-option.active { color:var(--gold); background:rgba(212,175,55,0.05); font-weight:600; }
    .btn-back { font-family:'Cinzel',serif; font-size:10px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; text-decoration:none; color:var(--gold); padding:6px 12px; border:1px solid rgba(212,175,55,0.4); border-radius:6px; transition:all 0.2s ease; background:rgba(212,175,55,0.05); white-space:nowrap; }
    .btn-back:hover { background:rgba(212,175,55,0.12); border-color:var(--gold); }
    main { max-width:760px; margin:0 auto; padding:4rem 2rem; }
    .page-title { font-family:'Cinzel',serif; font-size:1.8rem; font-weight:700; background:linear-gradient(135deg,var(--gold-dark),var(--gold-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:2rem; }
    .doc-section { margin-bottom:2.5rem; }
    .doc-section h2 { font-size:1.1rem; font-weight:600; color:var(--gold); margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:1px solid var(--border); }
    .themes-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:0.75rem; }
    .theme-chip { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:0.75rem 1rem; font-size:0.85rem; font-weight:500; }
    .shortcut-table { width:100%; border-collapse:collapse; }
    .shortcut-table tr { border-bottom:1px solid var(--border); }
    .shortcut-table td { padding:0.75rem 0; font-size:0.875rem; }
    .shortcut-table td:first-child { color:var(--text-muted); width:50%; }
    .key { background:rgba(212,175,55,0.1); border:1px solid rgba(212,175,55,0.3); color:var(--gold); padding:0.2rem 0.5rem; border-radius:4px; font-family:monospace; font-size:0.82rem; }
    footer { border-top:1px solid var(--border); padding:2rem; text-align:center; color:var(--text-muted); font-size:0.78rem; }
  </style>
</head>
<body>
  <header>
    <a href="../" class="logo-container">
      <div class="logo-icon">V</div>
      <div class="logo-text">Reborn Vision</div>
    </a>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="lang-select" id="lang-select">
        <button class="lang-select-btn" onclick="toggleLangMenu()">
          <span class="lang-flag">🇫🇷</span>
          <span class="lang-code">FR</span>
          <span class="lang-chevron">▾</span>
        </button>
        <div class="lang-select-menu">
          <button class="lang-option" data-lang="fr" onclick="setLang('fr')">🇫🇷 Français</button>
          <button class="lang-option" data-lang="en" onclick="setLang('en')">🇬🇧 English</button>
          <button class="lang-option" data-lang="es" onclick="setLang('es')">🇪🇸 Español</button>
          <button class="lang-option" data-lang="de" onclick="setLang('de')">🇩🇪 Deutsch</button>
          <button class="lang-option" data-lang="pt" onclick="setLang('pt')">🇧🇷 Português</button>
          <button class="lang-option" data-lang="it" onclick="setLang('it')">🇮🇹 Italiano</button>
          <button class="lang-option" data-lang="nl" onclick="setLang('nl')">🇳🇱 Nederlands</button>
          <button class="lang-option" data-lang="pl" onclick="setLang('pl')">🇵🇱 Polski</button>
          <button class="lang-option" data-lang="ru" onclick="setLang('ru')">🇷🇺 Русский</button>
          <button class="lang-option" data-lang="tr" onclick="setLang('tr')">🇹🇷 Türkçe</button>
          <button class="lang-option" data-lang="ja" onclick="setLang('ja')">🇯🇵 日本語</button>
          <button class="lang-option" data-lang="ko" onclick="setLang('ko')">🇰🇷 한국어</button>
          <button class="lang-option" data-lang="fil" onclick="setLang('fil')">🇵🇭 Filipino</button>
          <button class="lang-option" data-lang="zh" onclick="setLang('zh')">🇨🇳 中文</button>
          <button class="lang-option" data-lang="ar" onclick="setLang('ar')">🇸🇦 العربية</button>
        </div>
      </div>
      <a href="../" class="btn-back">← Accueil</a>
    </div>
  </header>
  <main>
    <h1 class="page-title" data-i18n="interface_page.title">Interface & Personnalisation</h1>

    <div class="doc-section">
      <h2 data-i18n="interface_page.themes_title">6 thèmes visuels</h2>
      <div class="themes-grid">
        <div class="theme-chip" style="border-color:rgba(212,175,55,0.4);color:#d4af37;" data-i18n="interface_page.theme1">MMO Gold</div>
        <div class="theme-chip" style="border-color:rgba(0,150,255,0.4);color:#0096ff;" data-i18n="interface_page.theme2">Cyber Blue</div>
        <div class="theme-chip" style="border-color:rgba(180,0,255,0.4);color:#b400ff;" data-i18n="interface_page.theme3">Neon Purple</div>
        <div class="theme-chip" style="border-color:rgba(255,60,0,0.4);color:#ff3c00;" data-i18n="interface_page.theme4">Fire Red</div>
        <div class="theme-chip" style="border-color:rgba(255,255,255,0.1);color:#aaa;" data-i18n="interface_page.theme5">Dark</div>
        <div class="theme-chip" style="border-color:rgba(255,255,255,0.3);color:#fff;" data-i18n="interface_page.theme6">White</div>
      </div>
    </div>

    <div class="doc-section">
      <h2 data-i18n="interface_page.shortcuts_title">Raccourcis clavier</h2>
      <table class="shortcut-table">
        <tr>
          <td><span class="key" data-i18n="interface_page.shortcut1_key">Ctrl+E</span></td>
          <td data-i18n="interface_page.shortcut1_desc">Activer le sélecteur de zone</td>
        </tr>
      </table>
    </div>
  </main>
  <footer>© 2026 Reborn Vision · <a href="mailto:seymoon.cell@gmail.com" style="color:var(--gold);text-decoration:none;">seymoon.cell@gmail.com</a></footer>
  <script type="module" src="../langs/index.js"></script>
</body>
</html>
